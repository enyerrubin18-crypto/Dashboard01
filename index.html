<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pr1.css">
</head>
<body>

    <div class="login-wrapper">
        <h2 class="page-title">Login del Dashboard </h2>

        <section class="login-card">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="inputNombre" placeholder="Ej: usuario_demo">
            </div>
            <div class="form-group">
                <label>Cédula:</label>
                <input type="text" id="inputCedula" placeholder="Ej: V12345678">
            </div>
            <button id="btnConsultar">Acceder</button>
        </section>

        <div class="credentials-hint">
            <p><strong>Credencial de prueba:</strong></p>
            <code>Nombre: usuario_demo | Cédula: V12345678</code>
        </div>

        <div id="resultado"></div>
    </div>

    <script src="clave.js"></script>
</body>
</html>
